<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Anagram 2048</title>
    <meta
      name="description"
      content="A compact sliding word puzzle that blends anagram solving with 2048-style movement."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@400;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/css/styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="game">
        <button class="quit-button" id="quitGame" type="button" aria-label="Quit current game">×</button>
        <header class="topbar">
          <div>
            <p class="eyebrow">Anagram x 2048</p>
            <h1>Anagram 2048</h1>
          </div>
          <div class="stats" aria-label="Game stats">
            <div>
              <span>Score</span>
              <strong id="score">0</strong>
            </div>
            <div>
              <span>Moves</span>
              <strong id="moves">0</strong>
            </div>
          </div>
        </header>

        <section class="board-wrap" aria-label="Game board">
          <div class="board" id="board"></div>
          <div class="banner hidden" id="banner" role="status" aria-live="polite">
            <strong id="bannerTitle">Solved</strong>
            <span id="bannerText">You lined up the word.</span>
            <button class="banner-action" id="playAgain" type="button">New game</button>
          </div>
        </section>

        <div class="controls" aria-label="Move controls">
          <button class="ghost" id="undoMove" type="button">Undo <span id="undoCount">3</span></button>
          <button class="sound-toggle" id="soundToggle" type="button" aria-pressed="true">Sound On</button>
          <div class="arrows">
            <button id="up" type="button" aria-label="Move up">↑</button>
            <button id="left" type="button" aria-label="Move left">←</button>
            <button id="down" type="button" aria-label="Move down">↓</button>
            <button id="right" type="button" aria-label="Move right">→</button>
          </div>
        </div>
      </section>

      <aside class="panel" aria-label="Puzzle details">
        <section class="rules" aria-label="Game guide">
          <h2>Hidden 4-letter word</h2>
          <p>Arrange it in order along any row or column. Each valid move adds one hidden-word letter.</p>
          <div class="legend" aria-label="Tile states">
            <span><i class="swatch swatch-clutter"></i>Extra copy</span>
            <span><i class="swatch swatch-answer"></i>Needed letter</span>
            <span><i class="swatch swatch-link"></i>Ordered pair</span>
          </div>
        </section>
      </aside>
    </main>

    <div class="quit-modal hidden" id="quitModal" role="dialog" aria-modal="true" aria-labelledby="quitTitle">
      <div class="quit-dialog">
        <h2 id="quitTitle">Choose mode</h2>
        <p id="quitText">Start a fresh hidden word.</p>
        <div class="mode-actions" aria-label="Difficulty options">
          <button class="mode-button" data-difficulty="easy" type="button">
            <strong>Easy</strong>
            <span>5×5 board</span>
          </button>
          <button class="mode-button" data-difficulty="hard" type="button">
            <strong>Hard</strong>
            <span>4×4 board</span>
          </button>
        </div>
        <div class="quit-actions">
          <button id="cancelQuit" type="button">Cancel</button>
        </div>
      </div>
    </div>

    <script src="assets/js/game.js"></script>
  </body>
</html>
